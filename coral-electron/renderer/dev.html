<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'">
  <title>Developer Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f5e9 40%, #e0f2f1 100%);
      color: #1a1a2e;
      padding: 20px 22px;
      overflow-y: auto;
      -webkit-font-smoothing: antialiased;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(0,150,136,0.15);
    }

    .header-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #0d47a1, #00897b);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
    }

    .header h2 {
      font-size: 1.2em;
      font-weight: 600;
      background: linear-gradient(135deg, #0d47a1, #00897b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .card {
      background: rgba(255,255,255,0.85);
      border-radius: 12px;
      border: 1px solid rgba(0,150,136,0.12);
      padding: 2px 0;
      margin-bottom: 12px;
      backdrop-filter: blur(8px);
    }

    .section-label {
      font-size: 0.75em;
      font-weight: 600;
      color: #00897b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 16px 4px;
      margin-bottom: 2px;
    }

    .field {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      min-height: 40px;
    }

    .field + .field {
      border-top: 1px solid rgba(0,150,136,0.06);
    }

    .field-label {
      font-size: 0.88em;
      font-weight: 500;
      color: #3a3a4a;
      flex-shrink: 0;
      margin-right: 16px;
    }

    .field-input {
      flex: 1;
      max-width: 220px;
    }

    .field-input input[type="text"],
    .field-input input[type="number"],
    .field-input select {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid #c8e6c9;
      border-radius: 8px;
      font-size: 0.88em;
      background: rgba(255,255,255,0.9);
      color: #1a1a2e;
      outline: none;
      transition: border-color 0.15s;
    }

    .field-input input:focus,
    .field-input select:focus {
      border-color: #00897b;
      box-shadow: 0 0 0 3px rgba(0,137,123,0.12);
    }

    .field-input select {
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%23666' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 10px center;
      padding-right: 28px;
    }

    .action-bar {
      display: flex;
      gap: 10px;
      margin-top: 6px;
    }

    .btn {
      padding: 9px 20px;
      border: none;
      border-radius: 8px;
      font-size: 0.88em;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
    }

    .btn:active {
      transform: scale(0.97);
    }

    .btn-primary {
      background: linear-gradient(135deg, #0d47a1, #00897b);
      color: #fff;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #0a3d8f, #00796b);
    }

    #devStatus {
      margin-top: 8px;
      font-size: 0.82em;
      min-height: 16px;
      color: #666;
    }

    #devStatus.error { color: #d32f2f; }
    #devStatus.success { color: #2e7d32; }

  </style>
</head>
<body>

  <div class="header">
    <div class="header-icon">C</div>
    <h2>Developer Settings</h2>
  </div>

  <div class="section-label">Advanced</div>
  <div class="card">
    <form id="devForm"></form>
  </div>

  <div class="action-bar">
    <button type="button" class="btn btn-primary" id="devSaveBtn">Apply</button>
  </div>
  <div id="devStatus"></div>

  <script src="dev.js"></script>
</body>
</html>
