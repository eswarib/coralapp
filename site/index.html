<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kurali — We’ve moved</title>
  <meta name="description" content="Coral is now Kurali. Visit the new home for private, local dictation.">
  <link rel="canonical" href="https://eswarib.github.io/coralapp/">
  <style>
    :root {
      color-scheme: light dark;
      --fg: #1a1a1a;
      --muted: #555;
      --bg: #faf8f5;
      --accent: #2d6a8f;
      --accent-hover: #1e4d6b;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --fg: #f2f0ec;
        --muted: #a8a4a0;
        --bg: #121416;
        --accent: #6eb8d4;
        --accent-hover: #9ad0e6;
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Ubuntu, sans-serif;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.55;
    }
    main {
      max-width: 32rem;
      text-align: center;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin: 0 0 1rem;
    }
    p {
      margin: 0 0 1rem;
      color: var(--muted);
    }
    a.button {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.65rem 1.25rem;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 600;
      border-radius: 0.5rem;
    }
    a.button:hover, a.button:focus {
      background: var(--accent-hover);
    }
    a.inline {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main>
    <h1>I’ve changed my name</h1>
    <p>
      This project used to live here as <strong>Coral</strong>.
      The same app is now <strong>Kurali</strong> — same idea, new name.
    </p>
    <p>
      Go here to find the new home:
    </p>
    <p>
      <a class="button" href="https://eswarib.github.io/kurali/">Open Kurali</a>
    </p>
    <p>
      Or use this link directly:
      <a class="inline" href="https://eswarib.github.io/kurali/">eswarib.github.io/kurali</a>
    </p>
  </main>
</body>
</html>
