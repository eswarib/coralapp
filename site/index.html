<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Coral is now Kurali. Visit the new home.">
  <title>Kurali — We’ve moved</title>
  <link rel="canonical" href="https://eswarib.github.io/coralapp/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Kurali — We’ve moved">
  <meta property="og:description" content="Coral is now Kurali. Visit the new home.">
  <meta property="og:url" content="https://eswarib.github.io/coralapp/">
  <meta property="og:image" content="https://eswarib.github.io/kurali/coral-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Caveat:wght@400;600;700&family=Kalam:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f3fbf9;
      --primary: #0d9488;
      --primary-bright: #14b8a6;
      --secondary: #0f766e;
      --glow: rgba(13, 148, 136, 0.35);
      --glow-soft: rgba(20, 184, 166, 0.22);
      --text: #134e4a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Kalam', cursive;
      font-weight: 400;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse 120% 80% at 50% -20%, var(--glow-soft), transparent 55%),
        radial-gradient(ellipse 80% 50% at 100% 50%, rgba(20, 184, 166, 0.08), transparent 45%);
      color: var(--text);
      text-align: center;
      padding: 2rem 1rem 3rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    header {
      max-width: 28rem;
    }

    header img {
      width: 120px;
      height: auto;
      margin-bottom: 1rem;
      filter: drop-shadow(0 4px 20px var(--glow-soft)) drop-shadow(0 0 1px rgba(13, 148, 136, 0.15));
    }

    h1 {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: clamp(2.2rem, 5.5vw, 3.2rem);
      margin: 0 0 0.75rem;
      color: var(--secondary);
      letter-spacing: 0.02em;
      text-shadow:
        0 0 48px var(--glow-soft),
        0 0 2px rgba(255, 255, 255, 0.8);
    }

    p.subtitle {
      font-family: 'Kalam', cursive;
      font-size: 1.2rem;
      margin: 0 0 1.75rem;
      color: #3f5a57;
      line-height: 1.5;
    }

    a.button.button-download-kurali {
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      background: linear-gradient(145deg, var(--primary-bright), var(--primary));
      color: white;
      padding: 0.75rem 1.35rem;
      border-radius: 0.5rem;
      text-decoration: none;
      box-shadow:
        0 2px 12px var(--glow-soft),
        0 1px 2px rgba(19, 78, 74, 0.12);
      transition: transform 0.15s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    a.button.button-download-kurali:hover {
      filter: brightness(1.05);
      box-shadow:
        0 4px 24px var(--glow),
        0 2px 8px rgba(13, 148, 136, 0.25);
      transform: translateY(-1px);
    }

    a.button.button-download-kurali:focus-visible {
      outline: 2px solid var(--secondary);
      outline-offset: 3px;
    }

    footer {
      font-family: 'Caveat', cursive;
      color: #3f5a57;
      font-size: 1.15rem;
      font-weight: 600;
      margin-top: 2.5rem;
    }

    footer p {
      margin: 0;
    }
  </style>
</head>
<body>

  <header>
    <img src="https://eswarib.github.io/kurali/coral-logo.png" width="120" height="120" alt="Kurali logo">
    <h1>I’ve changed my name</h1>
    <p class="subtitle"><strong>Coral</strong> is now <strong>Kurali</strong>. Same app, new name — continue on the new site.</p>
    <a href="https://eswarib.github.io/kurali/"
       class="button button-download-kurali"
       aria-label="Open the Kurali website">Open Kurali</a>
  </header>

  <footer>
    <p>© 2026 Kurali</p>
  </footer>

</body>
</html>
